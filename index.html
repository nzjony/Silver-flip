<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Silver Flip</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Game controls">
        <div class="brand">
          <span class="coin-mark" aria-hidden="true">$</span>
          <div>
            <h1>Silver Flip</h1>
            <p>Ride the yearly silver-price corridor.</p>
          </div>
        </div>

        <div class="controls">
          <label class="field">
            <span>Year</span>
            <select id="yearSelect"></select>
          </label>
          <button id="startButton" type="button">Start</button>
          <button id="pauseButton" type="button" aria-pressed="false">Pause</button>
        </div>

        <div class="stats" aria-live="polite">
          <div>
            <span id="priceLabel" class="stat-label">Price</span>
            <strong id="priceStat">$0.00</strong>
            <span id="priceTime" class="micro-stat">Annual</span>
          </div>
          <div>
            <span class="stat-label">Range</span>
            <strong id="rangeStat">0%</strong>
          </div>
          <div>
            <span class="stat-label">Score</span>
            <strong id="scoreStat">0</strong>
          </div>
        </div>
      </section>

      <section class="stage-wrap" aria-label="Silver Flip game">
        <canvas id="game" width="1200" height="680"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <h2>Flip the coin</h2>
            <p>Hold to thrust upward, release to fall. Fast half-on tapping should keep the coin roughly level.</p>
          </div>
        </div>
      </section>

      <section class="ticker" aria-label="Selected year silver profile">
        <div class="spark-wrap">
          <canvas id="spark" width="760" height="96"></canvas>
        </div>
        <p id="yearNote"></p>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
